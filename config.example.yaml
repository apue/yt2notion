# yt2notion 配置文件
# 复制为 config.yaml 并填入你的实际值

model:
  # 可选: claude_code | anthropic_api | openai_api
  backend: claude_code
  summarize_model: sonnet    # 结构化总结（英文处理强）
  translate_model: opus      # 中文化润色（中文质量高）
  review_model: haiku        # 章节提取 + 转录校对（轻量任务）

storage:
  # 可选: notion | obsidian | markdown
  backend: notion
  notion:
    token: ""                 # Notion integration token (CLI 模式需要)
    database_id: ""           # 目标 database ID (CLI 模式)
    parent_page_id: ""        # Notion 父页面 ID (slash command 模式，MCP 免 token)
    # 目录路由规则：根据关键词自动归类
    directory_rules:
      - match: ["muscle", "stretch", "rehab", "训练", "健身", "拉伸"]
        parent: "健身/训练笔记"
      - match: ["AI", "LLM", "agent", "model", "coding", "程序"]
        parent: "技术/AI"
      - match: ["travel", "food", "旅行", "美食"]
        parent: "生活/旅行"
      - default: "收件箱"

extract:
  # 字幕优先级（从左到右尝试）
  subtitle_priority:
    - "zh-Hans"
    - "zh-Hant"
    - "en"
  # 自动字幕作为 fallback
  auto_subtitle_fallback: true
  auto_subtitle_lang: "en"
  # 从 Chrome 读取 cookies（访问会员/年龄限制内容）
  cookies_from: chrome
  # ASR 语音识别 fallback（无字幕时自动启用）
  asr:
    backend: remote              # 可选: remote
    endpoint: ""                 # ASR 服务地址，或设置 ASR_ENDPOINT 环境变量

credit:
  # 始终在输出中包含来源信息
  always_include: true
  format: "来源：{channel} 「{title}」\n链接：{url}"

output:
  # chunk 分段长度（秒），用于时间戳关联
  chunk_duration_seconds: 120
  # 最终输出语言
  target_language: "zh-CN"
  # 长内容阈值（秒），超过此值使用 map-reduce 分层总结
  long_content_threshold_seconds: 1800
  # 单个 segment 最大长度（秒），超过会按句子边界细分
  max_segment_seconds: 900

workspace:
  # 工作目录，保存中间产物用于 resume
  base_dir: "./workspace"
